<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">

<head>
  <meta charset='utf-8'>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,maximum-scale=2">
  <link rel="stylesheet" type="text/css" media="screen" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=IBM+Plex+Sans:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="{{ '/assets/js/theme-toggle.js' | relative_url }}"></script>

  {% seo %}

  <!--[if lt IE 9]>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
  <![endif]-->
</head>

<body>
  <!-- Theme Toggle Button -->
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">◐</button>

  <!-- Falling-Data Header Art (thermoptic shimmer) -->
  <div id="header-container">
    <div class="data-stream" aria-hidden="true">
      <svg class="data-stream-svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid slice">
        <!-- Glyph columns generated by assets/js/circuit-animations.js;
             motion is CSS-driven and only runs under
             prefers-reduced-motion: no-preference -->
      </svg>
      <div class="ghost-silhouette">
        <div class="ghost-silhouette-head"></div>
        <div class="ghost-silhouette-shoulders"></div>
      </div>
    </div>

    <header class="site-header">
      <div class="header-content">
        <h1 class="site-title">
          <span class="title-part" data-text="HUMANITIES">HUMANITIES</span>
          <span class="title-connector">IN THE AGE OF</span>
          <span class="title-part ai-emphasis" data-text="AI">AI</span>
        </h1>

        <p class="dossier-line">[ ENG 6806 // FALL 2026 // DR. ANASTASIA SALTER ]</p>
      </div>
    </header>
  </div>

  <!-- Main Content -->
  <div id="main_content_wrap" class="outer">
    <section id="main_content" class="inner">
      {{ content }}
    </section>
  </div>

  <!-- Footer -->
  <div id="footer_wrap" class="outer">
    <footer class="inner">
      <p class="copyright">{{ site.title | default: site.github.repository_name }} maintained by <a href="{{ site.github.owner_url }}">{{ site.github.owner_name }}</a></p>
      <p class="footer-tagline"><em>the net is vast and infinite</em></p>
    </footer>
  </div>

  <!-- JavaScript for animations -->
  <script src="{{ '/assets/js/circuit-animations.js' | relative_url }}"></script>
</body>
</html>
